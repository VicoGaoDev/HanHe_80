<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image 2 提示词大全</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=20260511-2" />
    <link rel="shortcut icon" href="./favicon.svg?v=20260511-2" />
    <meta
      name="description"
      content="基于 GPT Image 2 案例库整理的静态提示词大全，支持风格标签分类、搜索筛选与案例详情查看。"
    />
    <script>
      (function () {
        const currentUrl = new URL(window.location.href);
        let baseHref = currentUrl.href.slice(0, currentUrl.href.lastIndexOf("/") + 1);

        if (currentUrl.protocol !== "file:") {
          const knownBasePath = "/gptimage2-prompt";
          const knownBaseIndex = currentUrl.pathname.indexOf(knownBasePath);

          if (knownBaseIndex >= 0) {
            baseHref = `${currentUrl.origin}${currentUrl.pathname.slice(0, knownBaseIndex)}${knownBasePath}/`;
          } else if (currentUrl.pathname.endsWith("/")) {
            baseHref = `${currentUrl.origin}${currentUrl.pathname}`;
          } else {
            baseHref = `${currentUrl.origin}${currentUrl.pathname.slice(
              0,
              currentUrl.pathname.lastIndexOf("/") + 1
            )}`;
          }
        }

        const baseElement = document.createElement("base");
        baseElement.href = baseHref;
        document.head.append(baseElement);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260511-2" />
    <script
      async
      src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"
    ></script>

          aria-label="展开筛选"

            >
              <span class="toggle-icon">◀</span>
            </button>
          </div>

          <div id="style-sidebar-body" class="sidebar-body">
            <section class="sidebar-section" data-section="styles">

                aria-expanded="true"

            <section class="sidebar-section" data-section="scenes">

                type="button"
                class="sidebar-section-toggle"

                aria-expanded="true"
                aria-controls="section-scenes-body"

                  <span class="sidebar-section-title">场景</span>
                  <span class="sidebar-section-current" data-section-current="scenes">全部场景</span>

    <div id="image-lightbox" class="image-lightbox" aria-hidden="true">
