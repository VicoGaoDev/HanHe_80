<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Loading...</title>
  <script>
    // 保留当前路由并加载 index.html，实现 SPA 刷新不404
    const currentPath = window.location.pathname;
    window.history.replaceState(null, null, currentPath);

    fetch('./index.html')
      .then(res => res.text())
      .then(html => {
        document.write(html);
        document.close();
      });
  </script>
</head>
<body></body>
</html>
